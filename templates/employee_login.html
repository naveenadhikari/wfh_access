{% extends "base.html" %}
{% block title %}Employee Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h3 class="mb-3">Employee Login</h3>
    <p class="text-muted">
      Sign in to request WFH access and manage your SSH public key.
    </p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">OTP (Authenticator code)</label>
        <input type="text" name="otp" class="form-control" required maxlength="6" pattern="\d{6}">
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3 mb-0">
      <a href="{{ url_for('index') }}">Back to portal</a>
    </p>
  </div>
</div>
{% endblock %}
