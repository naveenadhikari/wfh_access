{% extends "base.html" %}
{% block title %}Request Access{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h3 class="mb-3">Request WFH Access</h3>
    <p class="text-muted">Enter your credentials and current authenticator code to open access from your current IP.</p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">OTP (Authenticator code)</label>
        <input type="text" name="otp" class="form-control" required maxlength="6" pattern="\d{6}">
      </div>
      <button type="submit" class="btn btn-primary w-100">Request Access</button>
    </form>

    {% if result %}
    <div class="mt-4">
      <h5>Result</h5>
      <pre class="bg-light p-3 border">{{ result }}</pre>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
