{% extends "base.html" %}
{% block title %}Delete User{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3 class="mb-3 text-danger">Delete User</h3>
    <form method="POST" onsubmit="return confirm('Are you sure you want to permanently delete this user? This cannot be undone.');">
      <div class="mb-3">
        <label class="form-label">Select User to Delete</label>
        <select name="username" class="form-select" required>
            <option value="" disabled selected>-- Select a User --</option>
            {% for username in users.keys() %}
            <option value="{{ username }}">{{ username }}</option>
            {% endfor %}
        </select>
      </div>
      <div class="d-flex justify-content-between">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-danger">Delete User</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
