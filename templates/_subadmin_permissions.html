{# SubAdmin privilege checkbox — used in add/edit user forms #}
<div class="mb-4 mt-4 border-top pt-3">
    <h5>SubAdmin Privileges</h5>
    <p class="text-muted small">
        Grant this user default Subadmin privileges (Fetch OTP/SSH). Additional privileges can be configured in the Manage Admin dashboard.
    </p>
    <div class="p-3 bg-light border rounded">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_subadmin" id="is_subadmin"
                   {% if is_subadmin %}checked{% endif %}>
            <label class="form-check-label" for="is_subadmin">Make Subadmin</label>
        </div>
    </div>
</div>
