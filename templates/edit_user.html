{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Edit User: {{ username }}</h3>
  <a href="{{ url_for('view_users') }}" class="btn btn-outline-secondary">Back to Users</a>
</div>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Access permissions</label>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="allow_log_access" id="allowLog"
             {{ 'checked' if user.get('allowLogAccess') }}>
      <label class="form-check-label" for="allowLog">Log access</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="allow_metrics_access" id="allowMetrics"
             {{ 'checked' if user.get('allowServerMetricsAccess') }}>
      <label class="form-check-label" for="allowMetrics">Server metrics access</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="allow_hp_agent_access" id="allowHpAgent"
             {{ 'checked' if user.get('allowHpAgentAccess') }}>
      <label class="form-check-label" for="allowHpAgent">HP Agent access</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Ports to open (comma-separated)</label>
    <input type="text" name="ports_to_open" class="form-control"
           value="{{ user.get('portsToOpen', []) | join(', ') }}">
  </div>

  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('view_users') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>

{% endblock %}
